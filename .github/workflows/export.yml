name: Export databases to Parquet

on:
  workflow_dispatch:
    inputs:
      database:
        description: "Database to export (or 'all')"
        required: true
        type: choice
        options:
          - all
          - drugcentral
          - pharos
          - opentargets
          - clinicaltrials
          - mondo
          - string
          - corum
  schedule:
    # Monthly on the 1st at 04:00 UTC
    - cron: "0 4 1 * *"

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        database:
          - drugcentral
          - pharos
          - opentargets
          - clinicaltrials
          - mondo
          - string
          - corum
    steps:
      - name: Skip if not selected
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.database != 'all' &&
          github.event.inputs.database != matrix.database
        run: echo "Skipping ${{ matrix.database }}" && exit 0

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DuckDB
        run: pip install duckdb

      - name: Export ${{ matrix.database }}
        run: python scripts/export_${{ matrix.database }}.py

      - name: Get version
        id: version
        run: |
          if [ -f "output/${{ matrix.database }}_version.txt" ]; then
            echo "tag=${{ matrix.database }}/$(cat output/${{ matrix.database }}_version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ matrix.database }}/$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tarball
        run: |
          cd output/${{ matrix.database }}
          tar czf /tmp/${{ matrix.database }}.tar.gz *.parquet

      - name: Create/update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DB="${{ matrix.database }}"

          # Delete existing release with same tag if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            --title "$DB ($(echo $TAG | cut -d/ -f2))" \
            --notes "Automated Parquet export of $DB.

          Generated: $(date -u +%Y-%m-%d)
          Files: $(ls output/$DB/*.parquet | wc -l) tables
          Size: $(du -sh output/$DB/ | cut -f1)" \
            /tmp/$DB.tar.gz
