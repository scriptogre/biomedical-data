name: Export databases to Parquet

on:
  workflow_dispatch:
  schedule:
    # Monthly on the 1st at 04:00 UTC
    - cron: "0 4 1 * *"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: drugcentral
            label: DrugCentral
            description: "All official DrugCentral tables from the public PostgreSQL instance at unmtid-dbs.net."
          - database: pharos
            label: Pharos/TCRD
            description: "All tables from the Pharos/TCRD MySQL dump (FigShare). Converted via temporary MySQL container."
          - database: opentargets
            label: Open Targets
            description: "Selected Open Targets Platform datasets: targets, diseases, drugs, mechanisms, associations, indications."
          - database: clinicaltrials
            label: Clinical Trials (AACT)
            description: "All tables from the AACT daily pipe-delimited flat file export of ClinicalTrials.gov."
          - database: mondo
            label: MONDO
            description: "Full MONDO Disease Ontology: nodes and edges TSVs from the latest GitHub release."
          - database: string
            label: STRING
            description: "Human-only (taxon 9606) STRING data: protein info, aliases, and physical interactions."
          - database: corum
            label: CORUM
            description: "Full CORUM mammalian protein complex dataset."
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DuckDB
        run: pip install duckdb

      - name: Export ${{ matrix.label }}
        run: python scripts/export_${{ matrix.database }}.py

      - name: Get version
        id: version
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          echo "tag=${{ matrix.database }}/$DATE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          if [ -f "output/${{ matrix.database }}_version.txt" ]; then
            echo "source_version=$(cat output/${{ matrix.database }}_version.txt)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tarball and checksum
        run: |
          cd output/${{ matrix.database }}
          tar czf /tmp/${{ matrix.database }}.tar.gz *.parquet
          sha256sum /tmp/${{ matrix.database }}.tar.gz | awk '{print $1}' > /tmp/${{ matrix.database }}.sha256

      - name: Create/update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DB="${{ matrix.database }}"

          # Build table list from parquet filenames
          TABLE_LIST=$(ls output/$DB/*.parquet | xargs -I{} basename {} .parquet | sort | sed 's/^/- `/' | sed 's/$/`/')

          # Delete existing release with same tag if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          SOURCE_VERSION=""
          if [ -n "${{ steps.version.outputs.source_version }}" ]; then
            SOURCE_VERSION="**Source version:** ${{ steps.version.outputs.source_version }}
          "
          fi

          gh release create "$TAG" \
            --title "${{ matrix.label }} (${{ steps.version.outputs.date }})" \
            --notes "$(cat <<EOF
          ${{ matrix.description }}

          ${SOURCE_VERSION}**Size:** $(du -sh output/$DB/ | cut -f1) (zstd-compressed Parquet)

          ### Tables ($(ls output/$DB/*.parquet | wc -l | tr -d ' '))

          $TABLE_LIST
          EOF
          )" \
            /tmp/$DB.tar.gz \
            /tmp/$DB.sha256
